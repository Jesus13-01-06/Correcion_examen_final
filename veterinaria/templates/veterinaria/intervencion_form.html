{% extends 'veterinaria/base.html' %}

{% block contenido %}

<h2>{{ titulo }}</h2>

{% if intervencion %}
    <form method="post" action="{% url 'editar_intervencion' intervencion.id %}">
{% else %}
    <form method="post" action="{% url 'crear_intervencion' %}">
{% endif %}
    {% csrf_token %}
    {{ formulario.as_p }}
    <button type="submit">Guardar</button>
</form>

{% endblock %}
